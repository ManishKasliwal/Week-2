name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set GitHub Pages base path
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          owner="${GITHUB_REPOSITORY%/*}"
          if [ "$repo" = "${owner}.github.io" ]; then
            echo "BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/$repo" >> "$GITHUB_ENV"
          fi

      - name: Build dev container image
        run: docker build --file .devcontainer/Dockerfile --build-arg VARIANT=22-bookworm --tag week-2-pages .

      - name: Build site inside Docker
        run: |
          docker run --rm \
            --user root \
            -e BASE_PATH \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_REPOSITORY \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            week-2-pages \
            bash -lc "npm ci && npm run build"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
